toolbox.capture.tls.client_rejected=客户端拒绝了 EasyPostman 为 {0} 生成的 HTTPS 证书。常见原因是该应用/站点使用证书固定或独立证书仓库。建议右键该主机选择“排除此主机（直连）”。原始错误：{1}
toolbox.capture.tls.client_handshake_failed=客户端在 {0} 的 MITM TLS 握手期间关闭连接或拒绝证书。若同一主机反复出现，建议右键该主机选择“排除此主机（直连）”。原始错误：{1}
toolbox.capture.tls.diagnosis.title=TLS 抓取诊断
toolbox.capture.tls.diagnosis.body=主机 {0} 的 HTTPS 抓取失败，通常是证书固定、应用未信任 EasyPostman CA、应用使用独立证书仓库，或客户端主动关闭连接。建议右键该主机选择“排除此主机（直连）”；如果确实需要解密，再确认系统/应用信任了 EasyPostman 根 CA。原始错误：{1}
toolbox.capture.idle_details=抓包代理当前未运行。\n\n当前支持：\n- HTTP 显式代理\n- HTTPS CONNECT + MITM\n- WebSocket 升级与帧预览\n- SSE 流式响应预览\n- 请求 / 响应头\n- Body 预览、耗时与大小\n
toolbox.capture.empty.running=抓包代理正在运行。\n\n选择一条请求查看详情；如果列表为空，请确认系统代理已同步、目标应用正在走 127.0.0.1:8888，或调整抓包过滤。
