# ============================================================
# Easy Postman 自定义暗色主题配置文件
# ============================================================
# 说明：
#  - 此文件会在应用 EasyDarkLaf 主题时自动加载
#  - 配置文件必须与主题类 EasyDarkLaf.java 在同一包路径下
#  - 这里的配置会覆盖 FlatDarkLaf 的默认设置
#
# 配置加载顺序（后加载的会覆盖先加载的）：
#  1. FlatLaf.properties       (FlatLaf 基础配置)
#  2. FlatDarkLaf.properties   (暗色主题配置，EasyDarkLaf 继承自 FlatDarkLaf)
#  3. EasyDarkLaf.properties   (本文件，自定义配置)
#
# 参考：https://www.formdev.com/flatlaf/how-to-customize/
# ============================================================
#========================================
# 颜色变量定义（暗色主题）
#========================================
# 面板背景色（IDEA-like dark workspace chrome / outer boundary）
@panelBg=#26282c
# 卡片/内容区背景色（IDEA-like inner surface）
@surface=#1e1f22
# 树、列表等不可编辑工具窗口内容背景，与内容区统一
@toolWindowBg=@surface
# 输入/表头背景色（比内容区略亮，避免控件过重）
@inputBg=#2b2d30
# 前景文字层级
@textPrimary=#c9ccd3
@textSecondary=#b9bdc5
@textHint=#7b8089
@textDisabled=#565b64
# 顶部窗口 chrome 背景色（MenuBar 与内嵌 TitlePane 共用，等于外层背景）
@windowChromeBg=@panelBg
# Dialog chrome 背景色（仅用于 JDialog 标题栏、背景与 footer）
@dialogChromeBg=#1e1f22
# 菜单栏背景色（暗色主题 - 与窗口 chrome 一致）
@menuBg=@windowChromeBg
# 选中背景色
@selectionBg=#2b4371
# 非活动选中背景色
@inactiveSelectionBg=#303338
# Tab 区域背景色（IDEA-like: 未选中贴合编辑区）
@tabBg=@surface
# Tab 选中背景色（暗色下比编辑区稍亮）
@tabSelectedBg=#2b2d30
# Tab 悬停背景色
@tabHoverBg=@panelBg
# Tab 区域底部分割线
@tabSeparatorColor=#2b2d30
# 强调色（主题蓝色）
@accentColor=#3574f0
# 状态色（IDEA-like: 暗色下低饱和，避免抢过结构信息）
@statusSuccess=#57965c
@statusSuccessDark=#4e8f55
@statusError=#db5860
@statusErrorDark=#c75450
@statusErrorDarker=#a64545
@statusWarning=#c29e49
@statusWarningDark=#a8873f
@statusWarningDarker=#8a6d32
@statusInfo=#4faed0
# 按钮悬停背景色
@buttonHoverBg=#2b2d30
# 按钮按下背景色
@buttonPressedBg=#24262a
# 分割线焦点颜色（暗色主题 - 悬停时的强调色）
@dividerFocusColor=#3a3d42
# 分割线背景色（暗色主题 - 与主背景接近）
@dividerBg=@surface
# 分割线边框颜色（暗色主题 - 微妙的分隔线）
@dividerBorderColor=#2b2d30
# 边框颜色（暗色主题）
@borderColor=#323438
# 表格选中背景色（暗色主题）
@tableSelectionBg=@selectionBg
# 表格网格线颜色（暗色主题）
@tableGridColor=#2b2d30
# 表格边框颜色（暗色主题）
@tableBorderColor=#2b2d30
# 表格头部背景色
@tableHeaderBg=@inputBg
# 拖拽手柄颜色（默认状态 - 暗色主题）
@dragHandleColor=#9b9b9b
# 拖拽手柄颜色（选中/悬停状态 - 暗色主题）
@dragHandleActiveColor=#c8c8c8
# 性能测试图表颜色（暗色主题）
@performanceChartGridColor=#303338
@performanceChartCurveColor=@accentColor
@performanceChartAxisColor=#62666e
@performanceChartTextColor=@textSecondary
@performanceChartQpsLine=@statusSuccessDark
@performanceChartResponseTimeLine=@statusWarningDark
@performanceChartMatchedLine=@statusInfo
@performanceChartDurationLine=@statusInfo
@performanceChartErrorRateLine=@statusErrorDark
# 性能报告颜色（暗色主题）
@performanceReportTotalFg=#8ab4df
@performanceReportTotalBg=#263244
@performanceReportSuccessColor=@statusSuccess
@performanceReportWarningColor=@statusWarning
@performanceReportErrorColor=@statusError
# 性能结果表格颜色（暗色主题）
@performanceResultTableGridColor=@tableGridColor
@performanceResultSuccessForeground=@statusSuccessDark
@performanceResultWarningForeground=@statusWarningDark
@performanceResultFailureForeground=@statusErrorDark
@performanceResultMutedForeground=@textHint
@performanceResultSuccessStripe=@statusSuccessDark
@performanceResultFailureStripe=@statusErrorDarker
# 滚动条滑块颜色
@scrollbarThumb=#3f4248
# 滚动条滑块悬停颜色
@scrollbarThumbHover=#4c5057
# 滚动条轨道颜色
@scrollbarTrack=@surface
# 分隔符前景色
@separatorFg=#2b2d30
# 分隔符背景色
@separatorBg=@surface
# FlatLaf 内置变量覆盖
@accentFocusColor=@accentColor
@accentButtonDefaultBackground=if(@accentColor, @accentColor, tint(@accentBaseColor,15%))
