toolbox.capture.tls.diagnosis.body=主机 {0} 的 HTTPS 抓取失败，通常是证书固定、应用未信任 EasyPostman CA、应用使用独立证书仓库，或客户端主动关闭连接。建议右键该主机选择“排除此主机（直连）”；如果确实需要解密，再确认系统/应用信任了 EasyPostman 根 CA。原始错误：{1}
