cert.help.title=Client Certificate Help
cert.help.content=Client certificates are used for mTLS authentication.\n\nSupported certificate formats:\n- PFX/P12: one file that contains the certificate and private key\n- PEM: separate certificate and private key files\n\nHost matching:\n- Exact match: api.example.com\n- Wildcard match: *.example.com\n\nPort matching:\n- 0 matches all ports\n- A specific port only matches that port\n\nPriority: the first matching enabled certificate is used.
