toolbox.capture.manual_trust.title=安装根 CA
toolbox.capture.manual_trust.guide=EasyPostman 未能自动将该 CA 设为受信任。\n\nmacOS 下可按下面步骤手动处理：\n\n1. 在“钥匙串访问”中导入或打开下面的证书。\n2. 如果 macOS 询问，优先添加到“系统”钥匙串。\n3. 打开该证书条目，展开“信任”，并设置：\n   安全套接字层 (SSL) -> 始终信任\n4. 关闭对话框，并在提示时输入 macOS 密码。\n5. 完全重启浏览器后，再次测试 HTTPS。\n\n证书路径：\n{0}\n\n当前信任状态：\n{1}
toolbox.capture.manual_trust.guide.windows=EasyPostman 未能自动将该 CA 设为受信任。\n\nWindows 下可按下面方式手动处理：\n\n1. 打开下面的证书文件。\n2. 点击“安装证书”。\n3. 选择“当前用户”。\n4. 选择“将所有的证书都放入下列存储”。\n5. 选择“受信任的根证书颁发机构”。\n6. 完成向导，确认安全提示，然后重启浏览器。\n\n证书路径：\n{0}\n\n当前信任状态：\n{1}
