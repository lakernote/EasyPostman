toolbox.capture.tls.client_rejected=客户端拒绝了 EasyPostman 为 {0} 生成的 HTTPS 证书。常见原因是该应用/站点使用证书固定或独立证书仓库。建议右键该主机选择“排除此主机（直连）”。原始错误：{1}
