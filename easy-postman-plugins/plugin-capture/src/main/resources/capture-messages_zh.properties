toolbox.capture.empty.view_filter_no_match=当前显示过滤没有匹配记录。\n\n可以关闭“异常 / 慢请求 / 隐藏静态 / 隐藏遥测 / 只看 API”等显示过滤，或调整上方搜索条件。
