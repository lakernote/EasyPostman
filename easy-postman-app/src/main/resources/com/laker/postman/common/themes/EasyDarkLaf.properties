#========================================
# 组件通用设置
#========================================
# 圆角大小
Component.arc=12
Component.accentColor=@accentColor
Component.focusColor=@accentColor
Component.focusedBorderColor=@accentColor
Component.focusWidth=2
Component.innerFocusWidth=0
Component.innerOutlineWidth=0
# 箭头样式：chevron（V形箭头）、triangle（三角形）、arrow（实心箭头）
Component.arrowType=chevron
#========================================
# 按钮样式
#========================================
Button.arc=10
Button.focusedBackground=null
Button.hoverBackground=@buttonHoverBg
Button.pressedBackground=@buttonPressedBg
Button.default.background=@accentButtonDefaultBackground
Button.default.foreground=contrast($Button.default.background, tint($Button.foreground,50%), #fff, 50%)
Button.default.focusedBackground=null
Button.default.borderColor=shade($Button.default.background,15%)
Button.default.hoverBorderColor=tint($Button.default.background,50%)
Button.default.focusedBorderColor=$Button.default.hoverBorderColor
Button.default.boldText=true
Button.default.borderWidth=1
#========================================
# 切换按钮样式（Toggle Button）
#========================================
# ToggleButton 基础样式
ToggleButton.arc=10
ToggleButton.borderWidth=1
# ToggleButton 未选中状态
ToggleButton.background=#2f3238
ToggleButton.foreground=#aab1bd
ToggleButton.borderColor=@borderColor
# ToggleButton 选中状态（明显的蓝色背景）
ToggleButton.selectedBackground=@accentColor
ToggleButton.selectedForeground=#ffffff
ToggleButton.selectedBorderColor=#5e8ff0
# ToggleButton 悬停状态
ToggleButton.hoverBackground=#363941
ToggleButton.hoverBorderColor=#464950
# ToggleButton 选中+悬停状态（更亮的蓝色）
ToggleButton.selectedHoverBackground=#457fee
ToggleButton.selectedHoverBorderColor=#6a9bff
# ToggleButton 按下状态
ToggleButton.pressedBackground=@buttonPressedBg
ToggleButton.pressedBorderColor=#464950
# ToggleButton 选中+按下状态
ToggleButton.selectedPressedBackground=#2f62c9
ToggleButton.selectedPressedBorderColor=#2854ad
# ToggleButton 禁用状态
ToggleButton.disabledBackground=#2c2e33
ToggleButton.disabledForeground=#5e6470
ToggleButton.disabledBorderColor=#3b3d42
# ToggleButton 工具栏样式（扁平化）
ToggleButton.toolbar.hoverBackground=#363941
ToggleButton.toolbar.pressedBackground=@buttonPressedBg
ToggleButton.toolbar.selectedBackground=@accentColor
#========================================
# 复选框样式
#========================================
# 使用边框样式（选中时显示对勾，而不是填充背景色）
CheckBox.icon.style=
CheckBox.icon.focusWidth=1
#========================================
# 单选按钮样式
#========================================
# 使用边框样式
RadioButton.icon.style=
#========================================
# 文本组件样式
#========================================
TextComponent.arc=10
TextArea.background=@surface
TextArea.caretForeground=@accentColor
TextArea.selectionBackground=@selectionBg
TextArea.selectionForeground=#f1f5f9
TextPane.background=@surface
EditorPane.background=@surface
#========================================
# 下拉框样式
#========================================
#========================================
# 表格样式
#========================================
# --- 基础颜色 ---
Table.background=@surface
Table.selectionBackground=@tableSelectionBg
Table.selectionForeground=#f1f5f9
Table.selectionInactiveBackground=#36383d
Table.selectionInactiveForeground=#aab1bd
# --- 网格线 ---
Table.gridColor=@tableGridColor
# 显示水平网格线
Table.showHorizontalLines=true
# 显示垂直网格线
Table.showVerticalLines=true
# 显示表格尾部的垂直线
Table.showTrailingVerticalLine=true
# --- 边框 ---
Table.border=1,1,1,1,@tableBorderColor,2,2,2,2
# --- 拖拽手柄 ---
Table.dragHandleColor=@dragHandleColor
Table.dragHandleActiveColor=@dragHandleActiveColor
# --- 单元格样式 ---
Table.cellMargins=4,8,4,8
Table.intercellSpacing=0,0
Table.rowHeight=28
Table.selectionInsets=2,4,2,4
Table.selectionArc=8
Table.cellFocusColor=@accentColor
Table.showCellFocusIndicator=false
Table.dropLineColor=@accentColor
Table.dropLineShortColor=darken(@accentColor,15%)
Table.dropCellBackground=@selectionBg
Table.paintOutsideAlternateRows=true
Table.editorSelectAllOnStartEditing=true
Table.consistentHomeEndKeyBehavior=true
#========================================
# 表格头部样式
#========================================
TableHeader.background=@tableHeaderBg
TableHeader.height=32
TableHeader.cellMargins=4,8,4,8
TableHeader.hoverBackground=#2f3238
TableHeader.pressedBackground=#222427
TableHeader.separatorColor=@tableGridColor
TableHeader.bottomSeparatorColor=@tableGridColor
TableHeader.showTrailingVerticalLine=false
TableHeader.focusCellBackground=@tableHeaderBg
#========================================
# 滚动条样式
#========================================
ScrollBar.showButtons=false
ScrollBar.width=12
ScrollBar.thumbArc=6
ScrollBar.thumbInsets=2,2,2,2
# 暗色主题滚动条颜色（协调的深色调）
ScrollBar.thumb=@scrollbarThumb
ScrollBar.thumbHover=@scrollbarThumbHover
ScrollBar.track=@scrollbarTrack
#========================================
# 分割线样式
#========================================
# 分割面板背景色
SplitPane.background=@panelBg
# 分割线大小（宽度）
SplitPane.dividerSize=3
# 分割线焦点颜色（悬停时）
SplitPane.dividerFocusColor=@dividerFocusColor
# 分割器样式：grip（抓手）、plain（平面）
SplitPaneDivider.style=grip
# 分割器背景色
SplitPaneDivider.background=@dividerBg
# 分割器边框：上边框1px，左右0px，下边框1px，颜色为 dividerBorderColor
SplitPaneDivider.border=1,0,1,0,@dividerBorderColor
# 抓手点数量
SplitPaneDivider.gripDotCount=5
# 抓手点大小
SplitPaneDivider.gripDotSize=3
# 抓手点颜色（默认状态 - 暗色主题使用稍亮的灰色）
SplitPaneDivider.gripColor=#6b6f73
# 拖拽时的高亮颜色（暗色主题 - 更明显的提示）
SplitPaneDivider.draggingColor=#7a7e82
#========================================
# 选项卡样式
#========================================
TabbedPane.tabSeparatorsFullHeight=true
TabbedPane.arc=10
TabbedPane.tabAreaArc=10
TabbedPane.tabArc=10
TabbedPane.background=@tabBg
TabbedPane.tabAreaBackground=@tabBg
TabbedPane.contentAreaColor=@tabSeparatorColor
TabbedPane.selectedBackground=@tabSelectedBg
TabbedPane.hoverColor=@tabHoverBg
TabbedPane.tabSeparatorColor=@tabSeparatorColor
TabbedPane.showTabSeparators=false
TabbedPane.contentSeparatorHeight=1
# 取消滚动按钮，滚动按钮显示策略
TabbedPane.scrollButtonsPolicy=never
#========================================
# 树形控件样式
#========================================
Tree.background=@surface
Tree.selectionBackground=@tableSelectionBg
# 选中时的文本颜色（暗色主题 - 浅色文本）
Tree.selectionForeground=#f1f5f9
# 选中边框颜色（暗色主题 - 蓝色调）
Tree.selectionBorderColor=#5e8ff0
# 未激活时的选中背景色
Tree.selectionInactiveBackground=#36383d
Tree.selectionInactiveForeground=#aab1bd
# 拖拽线条颜色（暗色主题 - 更亮的蓝色，更明显）
Tree.dropLineColor=@accentColor
# 拖拽时的半透明覆盖层（暗色主题 - 深蓝色调）
Tree.dropCellBackground=@selectionBg
Tree.dropCellForeground=@accentColor
# 树节点悬停背景色（暗色主题 - 稍亮的灰色）
Tree.hoverBackground=@buttonHoverBg
Tree.hoverInactiveBackground=#2f3238
# 树节点行高
Tree.rowHeight=28
# 树节点缩进
Tree.leftChildIndent=8
Tree.rightChildIndent=12
# 树节点图标间距
Tree.iconTextGap=6
#========================================
# 列表样式
#========================================
