# ============================================================
# Easy Postman 自定义暗色主题配置文件
# ============================================================
# 说明：
#  - 此文件会在应用 EasyDarkLaf 主题时自动加载
#  - 配置文件必须与主题类 EasyDarkLaf.java 在同一包路径下
#  - 这里的配置会覆盖 FlatDarkLaf 的默认设置
#
# 配置加载顺序（后加载的会覆盖先加载的）：
#  1. FlatLaf.properties       (FlatLaf 基础配置)
#  2. FlatDarkLaf.properties   (暗色主题配置，EasyDarkLaf 继承自 FlatDarkLaf)
#  3. EasyDarkLaf.properties   (本文件，自定义配置)
#
# 参考：https://www.formdev.com/flatlaf/how-to-customize/
# ============================================================
#========================================
# 颜色变量定义（暗色主题）
#========================================
# 面板背景色（IDEA-like dark workspace gap）
@panelBg=#27292c
# 卡片/编辑区背景色（IDEA-like card/editor dark）
@surface=#191a1c
# 输入/表头背景色
@inputBg=#27292c
# 顶部窗口 chrome 背景色（MenuBar 与内嵌 TitlePane 共用，等于外层背景）
@windowChromeBg=@panelBg
# 菜单栏背景色（暗色主题 - 与窗口 chrome 一致）
@menuBg=@windowChromeBg
# 选中背景色
@selectionBg=#2d405f
# Tab 区域背景色（IDEA-like: 未选中贴合编辑区）
@tabBg=@surface
# Tab 选中背景色（暗色下比编辑区稍亮）
@tabSelectedBg=@panelBg
# Tab 悬停背景色
@tabHoverBg=#222428
# Tab 区域底部分割线
@tabSeparatorColor=#313338
# 强调色（主题蓝色）
@accentColor=#3771e1
# 按钮悬停背景色
@buttonHoverBg=#2f3238
# 按钮按下背景色
@buttonPressedBg=#222427
# 分割线焦点颜色（暗色主题 - 悬停时的强调色）
@dividerFocusColor=#464950
# 分割线背景色（暗色主题 - 与主背景接近）
@dividerBg=@panelBg
# 分割线边框颜色（暗色主题 - 微妙的分隔线）
@dividerBorderColor=#313338
# 边框颜色（暗色主题）
@borderColor=#3b3d42
# 表格选中背景色（暗色主题）
@tableSelectionBg=@selectionBg
# 表格网格线颜色（暗色主题）
@tableGridColor=#313338
# 表格边框颜色（暗色主题）
@tableBorderColor=#313338
# 表格头部背景色
@tableHeaderBg=@inputBg
# 拖拽手柄颜色（默认状态 - 暗色主题）
@dragHandleColor=#9b9b9b
# 拖拽手柄颜色（选中/悬停状态 - 暗色主题）
@dragHandleActiveColor=#c8c8c8
# 性能测试图表颜色（暗色主题）
@performanceChartGridColor=#505050
@performanceChartCurveColor=#5c9fff
@performanceChartAxisColor=#b0b0b0
@performanceChartTextColor=#c8c8c8
# 性能报告颜色（暗色主题）
@performanceReportTotalFg=#6bb6ff
@performanceReportTotalBg=#2d3e50
@performanceReportSuccessColor=#5cb85c
@performanceReportWarningColor=#5cb3ff
# 性能结果表格颜色（暗色主题）
@performanceResultTableGridColor=#313338
# 滚动条滑块颜色
@scrollbarThumb=#46484e
# 滚动条滑块悬停颜色
@scrollbarThumbHover=#555860
# 滚动条轨道颜色
@scrollbarTrack=@panelBg
# 分隔符前景色
@separatorFg=#313338
# 分隔符背景色
@separatorBg=#232528
# FlatLaf 内置变量覆盖
@accentFocusColor=@accentColor
@accentButtonDefaultBackground=if(@accentColor, @accentColor, tint(@accentBaseColor,15%))
