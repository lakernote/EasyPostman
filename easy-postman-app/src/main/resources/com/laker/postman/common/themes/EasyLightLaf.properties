# ============================================================
# Easy Postman 自定义主题配置文件
# ============================================================
# 说明：
#  - 此文件会在应用 EasyLightLaf 主题时自动加载
#  - 配置文件必须与主题类 EasyLightLaf.java 在同一包路径下
#  - 这里的配置会覆盖 FlatLightLaf 的默认设置
#
# 配置加载顺序（后加载的会覆盖先加载的）：
#  1. FlatLaf.properties       (FlatLaf 基础配置)
#  2. FlatLightLaf.properties  (浅色主题配置，EasyLightLaf 继承自 FlatLightLaf)
#  3. EasyLightLaf.properties  (本文件，自定义配置)
#
# 参考：https://www.formdev.com/flatlaf/how-to-customize/
# ============================================================
#========================================
# 颜色变量定义
#========================================
# 面板背景色（IDEA-like workspace gray）
@panelBg=#e9eaee
# 卡片/编辑区背景色
@surface=#ffffff
# 菜单背景色
# 顶部窗口 chrome 背景色（MenuBar 与内嵌 TitlePane 共用，等于外层背景）
@windowChromeBg=@panelBg
# 菜单背景色
@menuBg=@windowChromeBg
# 选中背景色
@selectionBg=#d4e3ff
# Tab 区域背景色（IDEA-like: 未选中白底）
@tabBg=#ffffff
# Tab 选中背景色（IDEA Islands Light）
@tabSelectedBg=#e2ebfe
# Tab 悬停背景色
@tabHoverBg=#f2f6ff
# Tab 区域底部分割线
@tabSeparatorColor=#e9eaee
# 强调色（主题蓝色）
@accentColor=#3771e1
# 表格选中背景色
@tableSelectionBg=#d4e3ff
# 表格网格线颜色
@tableGridColor=#e8ebef
# 表格头部背景色
@tableHeaderBg=#f4f6f8
# 表格边框颜色
@tableBorderColor=#e8ebef
# 拖拽手柄颜色（默认状态）
@dragHandleColor=#646464
# 拖拽手柄颜色（选中/悬停状态）
@dragHandleActiveColor=#3c3c3c
# 边框颜色
@borderColor=#d3dae6
# 分割线焦点颜色
@dividerFocusColor=#a0a4aa
# 分割线背景色
@dividerBg=@panelBg
# 分割线边框颜色
@dividerBorderColor=#d5d8de
# 按钮悬停背景色
@buttonHoverBg=#eff4ff
# 按钮按下背景色
@buttonPressedBg=#dce9ff
# 滚动条滑块颜色
# 性能测试图表颜色
@performanceChartGridColor=#dcdcdc
@performanceChartCurveColor=#2979ff
@performanceChartAxisColor=#646464
@performanceChartTextColor=#505050
# 性能报告颜色
@performanceReportTotalFg=#0066cc
@performanceReportTotalBg=#e6f0ff
@performanceReportSuccessColor=#009900
@performanceReportWarningColor=#3399ff
# 性能结果表格颜色
@performanceResultTableGridColor=#e6e6e6
@scrollbarThumb=#c8ccd4
# 滚动条滑块悬停颜色
@scrollbarThumbHover=#b7bdc8
# 滚动条轨道颜色
@scrollbarTrack=#f3f4f7
# 分隔符前景色
@separatorFg=#d5d8de
# 分隔符背景色
@separatorBg=#f0f0f0
# FlatLaf 内置变量覆盖
# 强调色焦点颜色（蓝色系）
@accentFocusColor=if(@accentColor, lighten(@accentColor,20%), lighten(@accentBaseColor,31%))
# 默认按钮背景色
@accentButtonDefaultBackground=if(@accentColor, @accentColor, tint(@accentBaseColor,15%))
#========================================
