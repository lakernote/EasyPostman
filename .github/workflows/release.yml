          # 构建 jpackage 参数数组
          JPACKAGE_ARGS=(
            --input target/dist-input
            --main-jar "$JAR_NAME"
            --main-class com.laker.postman.App
            --runtime-image target/runtime
            --type dmg
            --name "EasyPostman"
            --app-version "$VERSION"
            --dest dist
            --icon assets/mac/EasyPostman.icns
