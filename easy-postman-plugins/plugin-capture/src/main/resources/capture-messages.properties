toolbox.capture.manual_trust.title=Install Root CA
toolbox.capture.manual_trust.guide=EasyPostman could not make the CA trusted automatically.\n\nManual fallback on macOS:\n\n1. In Keychain Access, import/open the certificate shown below.\n2. Prefer adding it to the System keychain if macOS asks.\n3. Open the certificate entry, expand Trust, and set:\n   Secure Sockets Layer (SSL) -> Always Trust\n4. Close the dialog and enter your macOS password if prompted.\n5. Fully restart the browser and test HTTPS again.\n\nCertificate path:\n{0}\n\nCurrent trust status:\n{1}
toolbox.capture.manual_trust.guide.windows=EasyPostman could not make the CA trusted automatically.\n\nWindows fallback:\n\n1. Open the certificate shown below.\n2. Click Install Certificate.\n3. Choose Current User.\n4. Select Place all certificates in the following store.\n5. Choose Trusted Root Certification Authorities.\n6. Finish the wizard, confirm the security prompt, then restart the browser.\n\nCertificate path:\n{0}\n\nCurrent trust status:\n{1}
