# 切换按钮样式（Toggle Button）
#========================================
# ToggleButton 基础样式
ToggleButton.arc=6
ToggleButton.borderWidth=1
# ToggleButton 未选中状态
ToggleButton.background=#2b2d30
ToggleButton.foreground=@textSecondary
ToggleButton.borderColor=@borderColor
# ToggleButton 选中状态（明显的蓝色背景）
